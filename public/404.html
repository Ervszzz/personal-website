<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>404 | Ervin Fernandez</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        background-color: #070709;
        color: #e2e8f0;
        font-family: 'Space Mono', 'JetBrains Mono', monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .container { max-width: 480px; }
      .code {
        font-size: 6rem;
        font-weight: 700;
        color: transparent;
        background: linear-gradient(135deg, #00d4ff, #00ffcc);
        -webkit-background-clip: text;
        background-clip: text;
        line-height: 1;
        margin-bottom: 1rem;
      }
      .divider {
        width: 80px;
        height: 2px;
        background: linear-gradient(90deg, #7c3aed, #00d4ff, #00ffcc);
        margin: 1rem auto;
      }
      .message {
        color: rgba(226, 232, 240, 0.6);
        margin-bottom: 2rem;
        line-height: 1.6;
        font-size: 0.9rem;
      }
      .link {
        display: inline-block;
        border: 1px solid #00d4ff;
        color: #00d4ff;
        padding: 0.75rem 1.5rem;
        text-decoration: none;
        font-size: 0.85rem;
        transition: background 0.3s;
      }
      .link:hover { background: rgba(0, 212, 255, 0.1); }
      .redirecting { font-size: 0.75rem; color: rgba(226,232,240,0.3); margin-top: 1.5rem; }
    </style>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname +
        (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
        "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body>
    <div class="container">
      <div class="code">404</div>
      <div class="divider"></div>
      <p class="message">Page not found. You might have followed a broken link or typed the URL incorrectly.</p>
      <a class="link" href="/personal-website/">← Back to Home</a>
      <p class="redirecting">Redirecting automatically...</p>
    </div>
  </body>
</html>
